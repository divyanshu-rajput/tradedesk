<tr class="watchlist-row">
  <td class="watchlist-row__cell watchlist-row__cell--symbol">{{ displaySymbol() }}</td>
  <td class="watchlist-row__cell watchlist-row__cell--price" [priceFlash]="tick()?.price ?? null">
    {{ formatPrice(tick()?.price) }}
  </td>
  <td
    class="watchlist-row__cell watchlist-row__cell--change"
    [class.watchlist-row__cell--up]="(tick()?.changePct ?? 0) >= 0"
    [class.watchlist-row__cell--down]="(tick()?.changePct ?? 0) < 0"
  >
    {{ formatChange(tick()?.changePct) }}
  </td>
  <td class="watchlist-row__cell watchlist-row__cell--volume">
    {{ formatVolume(tick()?.volume) }}
  </td>
  @if (showRenderCount()) {
    <td class="watchlist-row__cell watchlist-row__cell--debug">{{ renderCount() }}</td>
  }
</tr>
